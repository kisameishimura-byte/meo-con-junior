<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Thúy Bình yêu dấu</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', cursive;
            overflow: hidden;
        }

        .name-container {
            text-align: center;
            z-index: 10;
        }

        .name-title {
            font-size: 5rem;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            animation: bounce 2s infinite;
        }

        .message {
            font-size: 1.5rem;
            color: #fff;
            margin-top: 10px;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .heart-icon {
            font-size: 100px;
            animation: heartbeat 1s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .falling {
            position: absolute;
            font-size: 25px;
            top: -50px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(105vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="name-container">
        <div class="heart-icon">❤️</div>
        <h1 class="name-title">Phan Ngọc Thúy Bình</h1>
        <p class="message">Mãi mãi yêu em!</p>
    </div>

    <script>
        function createFallingItem() {
            const item = document.createElement('div');
            item.className = 'falling';
            // Tạo mưa tim và mèo xen kẽ
            item.innerHTML = Math.random() > 0.5 ? '🐱' : '❤️';
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(item);
            
            setTimeout(() => {
                item.remove();
            }, 7000);
        }
        
        // Tạo liên tục mỗi 300ms
        setInterval(createFallingItem, 300);
    </script>
</body>
</html>
