<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dành cho Thúy Bình</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .name-title {
            font-size: 3rem;
            color: #ff3366;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Trái tim to ở giữa */
        .big-heart {
            font-size: 150px;
            cursor: pointer;
            margin: 30px 0;
            animation: beat 1s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        /* Hiệu ứng mưa tim & mèo */
        .falling {
            position: fixed;
            font-size: 24px;
            top: -50px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
        }
    </style>
</head>
<body>

    <h1 class="name-title">Phan Ngọc Thúy Bình</h1>
    
    <div class="big-heart">❤️</div>

    <div class="container">
        </div>

    <script>
        function createFallingItem() {
            const item = document.createElement('div');
            item.className = 'falling';
            item.innerHTML = Math.random() > 0.5 ? '🐱' : '❤️';
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = (Math.random() * 3 + 4) + 's';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 7000);
        }
        setInterval(createFallingItem, 400);
    </script>
</body>
</html>
