<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Kitty Love</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .name-title {
            font-size: 4rem;
            color: #ff3366;
            text-shadow: 2px 2px 10px rgba(255,255,255,0.5);
            margin-bottom: 30px;
        }

        #btn-heart {
            font-size: 80px;
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        #btn-heart:active { transform: scale(0.9); }

        .falling {
            position: absolute;
            font-size: 25px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1 class="name-title">Phan Ngọc Thúy Bình</h1>
    <button id="btn-heart">❤️</button>

    <script>
        let count = 0;
        const btn = document.getElementById('btn-heart');

        btn.addEventListener('click', () => {
            count++;
            // Tạo trái tim nhỏ bay lên tại vị trí click
            createHeart(true);

            if (count === 50) {
                // Bùng nổ trái tim
                for(let i = 0; i < 50; i++) {
                    createExplosion();
                }
                alert("Yêu Bình nhiều lắm! ❤️");
            }
        });

        function createHeart(isSmall) {
            const heart = document.createElement('div');
            heart.className = 'falling';
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '50%';
            heart.style.animationDuration = '3s';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 3000);
        }

        function createExplosion() {
            const heart = document.createElement('div');
            heart.className = 'falling';
            heart.innerHTML = '❤️';
            heart.style.left = '50vw';
            heart.style.top = '50vh';
            heart.style.fontSize = (Math.random() * 50 + 20) + 'px';
            // Bay tung tóe
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 200 + 50;
            heart.style.transition = 'all 1s ease-out';
            document.body.appendChild(heart);
            
            setTimeout(() => {
                heart.style.transform = `translate(${Math.cos(angle)*velocity}px, ${Math.sin(angle)*velocity}px) scale(0)`;
            }, 10);
            setTimeout(() => heart.remove(), 1000);
        }
    </script>
</body>
</html>
